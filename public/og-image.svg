<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="PrismaWeb — Agence Web Strasbourg">
  <title>PrismaWeb — Agence Web Strasbourg</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.7">
      <stop offset="0%" stop-color="#FF6B2C" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#FF6B2C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF6B2C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Large decorative PW mark on the right -->
  <g transform="translate(820, 180) scale(8)" opacity="0.16">
    <path d="M 9 35 L 9 14 L 16 14 Q 21 14 21 18.5 Q 21 23 16 23 L 9 23"
          fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 25 14 Q 26 33 30 33 Q 32 33 33.5 23 Q 35 33 37 33 Q 41 33 42 14"
          fill="none" stroke="#FF6B2C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Brand mark (top-left) -->
  <g transform="translate(80, 80)">
    <rect width="64" height="64" rx="14" fill="#0A0A0A" stroke="#FF6B2C" stroke-width="2"/>
    <g transform="translate(8, 8) scale(1)">
      <path d="M 9 35 L 9 14 L 16 14 Q 21 14 21 18.5 Q 21 23 16 23 L 9 23"
            fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 25 14 Q 26 33 30 33 Q 32 33 33.5 23 Q 35 33 37 33 Q 41 33 42 14"
            fill="none" stroke="#FF6B2C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <text x="170" y="125" font-family="'Geist','Inter',Helvetica,Arial,sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">
    Prisma<tspan fill="#FF6B2C">Web</tspan>
  </text>

  <text x="80" y="320" font-family="'Fraunces',Georgia,serif" font-size="92" font-weight="600" fill="#FFFFFF" letter-spacing="-2">
    <tspan x="80" dy="0">Création de sites</tspan>
    <tspan x="80" dy="100">web premium.</tspan>
  </text>

  <text x="80" y="500" font-family="'Geist',Helvetica,Arial,sans-serif" font-size="26" fill="#FFFFFF" opacity="0.7">
    À Strasbourg, en Alsace, et partout en France.
  </text>

  <rect x="80" y="555" width="120" height="4" rx="2" fill="#FF6B2C"/>
  <text x="80" y="595" font-family="'Geist',Helvetica,Arial,sans-serif" font-size="22" font-weight="600" fill="#FF6B2C">
    prismaweb.fr
  </text>
</svg>
