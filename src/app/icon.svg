<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="PrismaWeb">
  <title>PrismaWeb</title>
  <rect x="2" y="2" width="44" height="44" rx="11" fill="#0A0A0A"/>
  <!-- Incoming white light beam (left side) -->
  <line x1="8" y1="24" x2="19" y2="24" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Prism triangle outline -->
  <path d="M19 33 L29 17 L29 33 Z" fill="none" stroke="#FF6B2C" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Refracted spectrum (right side) -->
  <line x1="29" y1="20" x2="40" y2="14" stroke="#FFB366" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="29" y1="24" x2="40" y2="22" stroke="#FF8B4D" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="29" y1="28" x2="40" y2="30" stroke="#FF6B2C" stroke-width="1.8" stroke-linecap="round"/>
</svg>
